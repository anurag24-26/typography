<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Cloud</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
      <div class="flex flex-col items-center mb-6">
        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-2xl mb-4 shadow-lg shadow-indigo-500/20">
          🔒
        </div>
        <h1 class="text-xl font-semibold text-white">Welcome back</h1>
        <p class="text-slate-400 text-sm mt-1">Enter your password to access My Cloud</p>
      </div>

      <label for="passwordInput" class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
      <input
        type="password"
        id="passwordInput"
        placeholder="••••••••"
        class="w-full bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl px-4 py-3 mb-4 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
      />

      <button
        id="loginBtn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-3 rounded-xl transition shadow-lg shadow-indigo-600/20"
      >
        Login
      </button>

      <p id="loginError" class="text-rose-400 text-sm mt-3 text-center min-h-[1.25rem]"></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appScreen" class="screen hidden min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-slate-900/80 backdrop-blur border-b border-slate-800">
      <div class="max-w-3xl mx-auto flex items-center justify-between px-4 py-3 sm:px-6">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-base shadow shadow-indigo-500/20">
            ☁️
          </div>
          <h1 class="text-white font-semibold text-base sm:text-lg">My Cloud</h1>
        </div>
        <button
          id="logoutBtn"
          class="text-slate-400 hover:text-white text-sm font-medium px-3 py-2 rounded-lg hover:bg-slate-800 transition"
        >
          Logout
        </button>
      </div>
    </header>

    <main class="flex-1 w-full max-w-3xl mx-auto px-4 py-6 sm:px-6 flex flex-col gap-6">

      <!-- New file card -->
      <section class="bg-slate-900 border border-slate-800 rounded-2xl p-4 sm:p-5">
        <h2 class="text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2">
          <span class="text-indigo-400">＋</span> New text file
        </h2>

        <input
          type="text"
          id="fileName"
          placeholder="File name, e.g. notes.txt"
          class="w-full bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl px-4 py-2.5 mb-3 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-sm"
        />

        <textarea
          id="fileContent"
          placeholder="Write or paste your text here..."
          rows="5"
          class="w-full bg-slate-800 border border-slate-700 text-white placeholder-slate-500 rounded-xl px-4 py-3 outline-none resize-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-sm leading-relaxed"
        ></textarea>

        <div class="flex items-center justify-between mt-3 gap-3">
          <p id="saveMsg" class="text-xs text-emerald-400 min-h-[1rem]"></p>
          <button
            id="saveBtn"
            class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition shadow-lg shadow-indigo-600/20 shrink-0"
          >
            Save to cloud
          </button>
        </div>
      </section>

      <!-- File list -->
      <section class="bg-slate-900 border border-slate-800 rounded-2xl p-4 sm:p-5 flex-1">
        <h2 class="text-sm font-semibold text-slate-200 mb-3">Your files</h2>
        <div id="fileList" class="flex flex-col gap-2.5">
          <!-- files injected here -->
        </div>
      </section>

    </main>
  </div>

  <!-- VIEW FILE MODAL -->
  <div id="viewModal" class="modal hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl">
      <div class="flex items-center justify-between px-5 py-4 border-b border-slate-800">
        <h2 id="viewName" class="text-white font-medium truncate pr-8 text-sm sm:text-base"></h2>
        <button
          id="closeModal"
          class="text-slate-400 hover:text-white text-2xl leading-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-800 transition"
        >
          ×
        </button>
      </div>
      <pre id="viewContent" class="text-slate-200 text-sm whitespace-pre-wrap break-words px-5 py-4 overflow-y-auto flex-1"></pre>
      <div class="px-5 py-4 border-t border-slate-800">
        <button
          id="downloadBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-xl transition shadow-lg shadow-indigo-600/20"
        >
          Download
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
